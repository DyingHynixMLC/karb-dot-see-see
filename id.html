<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chromebook Identification Wizard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef1f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wizard {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: bold;
    }

    select {
      width: 100%;
      padding: 0.5rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .submit-btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #3a78c2;
    }

    .results {
      margin-top: 2rem;
      background: #f8f9fb;
      padding: 1rem;
      border-left: 4px solid #4a90e2;
      border-radius: 8px;
    }

    .results strong {
      display: block;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

<div class="wizard">
  <h2>Chromebook ID Wizard</h2>

  <div class="form-group">
    <label for="chromeos">ChromeOS Version</label>
    <select id="chromeos">
      <option value="">Select version</option>
      <option value="100">100</option>
      <option value="110">110</option>
      <option value="115">115</option>
      <option value="120">120</option>
      <option value="125">125</option>
      <option value="130">130</option>
      <option value="132">132</option>
      <option value="135">135</option>
    </select>
  </div>

  <div class="form-group">
    <label for="chip">Security Chip</label>
    <select id="chip">
      <option value="">Select chip</option>
      <option value="Ti50">Ti50</option>
      <option value="Cr50">Cr50</option>
      <option value="None">None</option>
    </select>
  </div>

  <div class="form-group">
    <label for="keyrolled">Keyrolled</label>
    <select id="keyrolled">
      <option value="">Select status</option>
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
  </div>

  <div class="form-group">
    <label for="kernel">Kernel Version</label>
    <select id="kernel">
      <option value="">Select version</option>
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>

  <button class="submit-btn" onclick="identify()">Identify</button>

  <div class="results" id="results" style="display:none;"></div>
</div>

<script>
  function identify() {
    const chromeos = parseInt(document.getElementById("chromeos").value);
    const chip = document.getElementById("chip").value;
    const keyrolled = document.getElementById("keyrolled").value === "Yes";
    const kernel = parseInt(document.getElementById("kernel").value);

    const results = [];

    const exploits = {
      0: ["SH1mmer"],
      1: ["SH1mmer"],
      2: ["CryptoSmite"],
      3: ["BadRecovery"],
      4: ["Icarus", "Br1ck"],
      5: ["Pencil"]
    };

    const cutoff = {
      SH1mmer: 110,
      CryptoSmite: 120,
      BadRecovery: 125,
      Icarus: 130,
      Br1ck: 132,
      Pencil: 999 // Unpatchable
    };

    const kernelExploits = exploits[kernel] || [];

    for (const exploit of kernelExploits) {
      if (keyrolled && ["SH1mmer", "Br1ck", "Icarus", "Pencil"].includes(exploit)) continue;
      if (chip === "Ti50" && exploit === "Pencil") continue;
      if (chromeos >= cutoff[exploit]) continue;
      results.push(exploit);
    }

    const resultBox = document.getElementById("results");
    resultBox.style.display = "block";

    if (results.length > 0) {
      resultBox.innerHTML = `<strong>Possible Exploits:</strong><ul>${results.map(r => `<li>${r}</li>`).join("")}</ul>`;
    } else {
      resultBox.innerHTML = `<strong>No usable exploits found with the selected configuration.</strong>`;
    }
  }
</script>

</body>
</html>
