<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chromebook Identification Wizard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef1f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wizard {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: bold;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 0.5rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .submit-btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #3a78c2;
    }

    .results {
      margin-top: 2rem;
      background: #f8f9fb;
      padding: 1rem;
      border-left: 4px solid #4a90e2;
      border-radius: 8px;
    }

    .results strong {
      display: block;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

<div class="wizard">
  <h2>Chromebook ID Wizard</h2>

  <div class="form-group">
    <label for="chromeos">ChromeOS Version</label>
    <input type="number" id="chromeos" placeholder="e.g. 122" min="1" />
  </div>

  <div class="form-group">
    <label for="chip">Security Chip</label>
    <select id="chip">
      <option value="">Select chip</option>
      <option value="Ti50">Ti50</option>
      <option value="Cr50">Cr50</option>
      <option value="None">None</option>
    </select>
  </div>

  <div class="form-group">
    <label for="keyrolled">Keyrolled</label>
    <select id="keyrolled">
      <option value="">Select status</option>
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
  </div>

  <div class="form-group">
    <label for="kernel">Kernel Version</label>
    <select id="kernel">
      <option value="">Select version</option>
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>

  <button class="submit-btn" onclick="identify()">Identify</button>

  <div class="results" id="results" style="display:none;"></div>
</div>

<script>
  function identify() {
    const chromeos = parseInt(document.getElementById("chromeos").value);
    const chip = document.getElementById("chip").value;
    const keyrolled = document.getElementById("keyrolled").value === "Yes";
    const kernel = parseInt(document.getElementById("kernel").value);

    const resultBox = document.getElementById("results");

    if (isNaN(chromeos) || isNaN(kernel) || chip === "" || document.getElementById("keyrolled").value === "") {
      resultBox.style.display = "block";
      resultBox.innerHTML = `<strong>Please fill in all fields.</strong>`;
      return;
    }

    const exploits = {
      SH1mmer:     { minKernel: 0, maxOS: 109 },
      CryptoSmite: { minKernel: 2, maxOS: 119 },
      BadRecovery: { minKernel: 3, maxOS: 124 },
      Icarus:      { minKernel: 4, maxOS: 129 },
      Br1ck:       { minKernel: 4, maxOS: 131 },
      Pencil:      { minKernel: 5, maxOS: 999 } // Unpatchable
    };

    const blockedByKeyroll = ["SH1mmer", "Pencil", "Icarus", "Br1ck"];
    const blockedByTi50 = ["Pencil"];

    const validExploits = [];

    for (const [name, { minKernel, maxOS }] of Object.entries(exploits)) {
      const kernelOK = kernel >= minKernel;
      const osOK = chromeos <= maxOS;
      const notKeyrolledBlocked = !keyrolled || !blockedByKeyroll.includes(name);
      const notTi50Blocked = !(chip === "Ti50" && blockedByTi50.includes(name));

      if (kernelOK && osOK && notKeyrolledBlocked && notTi50Blocked) {
        validExploits.push(name);
      }
    }

    resultBox.style.display = "block";
    if (validExploits.length > 0) {
      resultBox.innerHTML = `<strong>Possible Exploits:</strong><ul>${validExploits.map(e => `<li>${e}</li>`).join("")}</ul>`;
    } else {
      resultBox.innerHTML = `<strong>No usable exploits found with the selected configuration.</strong>`;
    }
  }
</script>

</body>
</html>
