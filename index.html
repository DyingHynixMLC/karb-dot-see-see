<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>kraeb.cc</title>
  <link rel="icon" href="https://cdn.discordapp.com/avatars/721608676783423499/01f5a25b1d88c75e0a8728b5c222dd86.png" type="image/png">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: black;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 2rem;
      width: 400px;
      height: 450px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      color: white;
      position: relative;
      z-index: 1;
      user-select: none;
    }

    .pfp {
      width: 100px;
      height: 100px;
      border-radius: 100%;
      object-fit: cover;
      border: 3px solid white;
      margin-bottom: 1rem;
    }

    .info {
      margin: 0.5rem 0;
      font-size: 1rem;
    }

    .info a {
      color: #00afff;
      text-decoration: none;
    }

    .info a:hover {
      text-decoration: underline;
    }

    #xbox-guide {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      z-index: 1000;
      color: white;
      overflow: hidden;
    }

    .blade-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateY(100vh);
      display: flex;
      align-items: center;
      transition: transform 0.25s ease-in-out;
    }

    .blade-wrapper.active {
      transform: translate(-50%, -50%);
    }

    .blade {
      background: rgba(40, 40, 40, 0.95);
      width: 360px;
      height: 240px;
      border-radius: 1rem;
      margin-left: -240px;
      padding: 1.5rem;
      box-shadow: 0 0 8px rgba(0,0,0,0.5), inset 0 0 0 2px #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: transform 0.25s ease, z-index 0.25s;
      cursor: pointer;
    }

    .blade:first-child {
      margin-left: 0;
    }

    .blade.active {
      transform: scale(1.05);
      z-index: 10;
      background: rgba(60, 60, 60, 0.98);
    }

    .blade h3 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .blade a {
      color: #00afff;
      text-decoration: none;
      font-weight: bold;
    }

    .blade a:hover {
      text-decoration: underline;
    }

    .blade button {
      margin-top: 1rem;
      background: #00afff;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 0.5rem;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <div class="card">
    <img class="pfp" src="https://cdn.discordapp.com/avatars/721608676783423499/01f5a25b1d88c75e0a8728b5c222dd86.png" alt="pfp">
    <div class="info">hiya, i'm kraeb</div>
    <div class="info">programmer or something</div>
    <div class="info"><a href="https://github.com/DyingHynixMLC" target="_blank">github profile</a></div>
    <div class="info"><a href="https://discord.com/users/721608676783423499" target="_blank">discord profile</a></div>
  </div>

  <div id="xbox-guide">
    <div class="blade-wrapper active" id="blade-wrapper">
      <div class="blade">
        <h3>Coming Soon</h3>
        <p>Another project is on the way.</p>
      </div>
      <div class="blade active">
        <h3>Projects</h3>
        <a href="https://kraeb.cc/decookiefy" target="_blank">decookiefy</a>
        <button onclick="hideGuide()">Close Guide (M)</button>
      </div>
      <div class="blade">
        <h3>Coming Soon</h3>
        <p>Another project is on the way.</p>
      </div>
      <div class="blade">
        <h3>Coming Soon</h3>
        <p>Another project is on the way.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    const guide = document.getElementById('xbox-guide');
    const wrapper = document.getElementById('blade-wrapper');
    const blades = Array.from(document.querySelectorAll('.blade'));
    let activeIndex = 1;

    function showGuide() {
      guide.style.display = 'block';
      setTimeout(() => wrapper.classList.add('active'), 10);
    }

    function hideGuide() {
      wrapper.classList.remove('active');
      setTimeout(() => guide.style.display = 'none', 250);
    }

    function setActive(index) {
      blades.forEach(b => b.classList.remove('active'));
      activeIndex = (index + blades.length) % blades.length;
      blades[activeIndex].classList.add('active');
    }

    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'm') {
        guide.style.display === 'block' ? hideGuide() : showGuide();
      } else if (e.key === 'ArrowLeft') {
        setActive(activeIndex - 1);
      } else if (e.key === 'ArrowRight') {
        setActive(activeIndex + 1);
      }
    });

    blades.forEach((blade, i) => {
      blade.addEventListener('click', () => setActive(i));
    });

    particlesJS("particles-js", {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3, random: true },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#ffffff",
          opacity: 0.4,
          width: 1
        },
        move: { enable: true, speed: 3 }
      },
      interactivity: {
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" }
        },
        modes: {
          repulse: { distance: 100 },
          push: { particles_nb: 4 }
        }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
