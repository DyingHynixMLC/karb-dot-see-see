<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="https://cdn.discordapp.com/avatars/721608676783423499/01f5a25b1d88c75e0a8728b5c222dd86.png?size=512" type="image/png" sizes="512x512">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>kraeb.cc</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 2rem;
      width: 400px;
      height: 450px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      color: white;
      position: relative;
      z-index: 1;
      user-select: none;
    }

    .pfp {
      width: 100px;
      height: 100px;
      border-radius: 100%;
      object-fit: cover;
      border: 3px solid white;
      margin-bottom: 1rem;
    }

    .info {
      margin: 0.5rem 0;
      font-size: 1rem;
    }

    .info a {
      color: #00afff;
      text-decoration: none;
    }

    .info a:hover {
      text-decoration: underline;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>
  
  <div class="card">
    <img class="pfp" src="https://cdn.discordapp.com/avatars/721608676783423499/01f5a25b1d88c75e0a8728b5c222dd86.png?size=512" alt="Profile Picture">
    <div class="info">hiya, i'm kraeb</div>
    <div class="info">programmer or something</div>
    <div class="info">my <a href="https://github.com/DyingHynixMLC" target="_blank">github profile</a></div>
    <div class="info">my <a href="https://discord.com/users/721608676783423499" target="_blank">discord profile</a></div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    const backgrounds = ["background.jpg", "borealis.jpg", "boreaalis.jpg"];
    const randomImage = backgrounds[Math.floor(Math.random() * backgrounds.length)];
    document.body.style.backgroundImage = `url('${randomImage}')`;
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#ffffff" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.5 },
        "size": { "value": 3, "random": true },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#ffffff",
          "opacity": 0.4,
          "width": 1
        },
        "move": { "enable": true, "speed": 3 }
      },
      "interactivity": {
        "events": {
          "onhover": { "enable": true, "mode": "repulse" },
          "onclick": { "enable": true, "mode": "push" }
        },
        "modes": {
          "repulse": { "distance": 100 },
          "push": { "particles_nb": 4 }
        }
      },
      "retina_detect": true
    });
  </script>
<!-- Guide Overlay -->
<div id="xbox-guide" style="
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(8px);
  z-index: 1000;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
">
  <div id="xbox-guide-content" style="
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 320px;
    background: rgba(20, 20, 20, 0.9);
    border-radius: 1rem;
    padding: 1.5rem;
    text-align: center;
    transition: transform 0.3s ease;
  ">
    <h3 style="margin-top: 0; font-weight: 700; font-size: 1.8rem;">Projects</h3>
    <p style="margin: 1rem 0;">Press <b>M</b> to toggle this guide.</p>
    <button onclick="document.getElementById('xbox-guide').style.display='none'; resetScale();" style="
      background: #00afff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.5rem 1.2rem;
      font-size: 1rem;
      color: white;
      cursor: pointer;
    ">Close</button>
  </div>
</div>

<script>
  const guide = document.getElementById('xbox-guide');
  const content = document.getElementById('xbox-guide-content');

  function resetScale() {
    content.style.transform = 'translate(-50%, -50%) scale(1)';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key.toLowerCase() === 'm') {
      if (guide.style.display === 'block') {
        // Hide and reset scale
        guide.style.display = 'none';
        resetScale();
      } else {
        // Show and zoom in
        guide.style.display = 'block';
        // Allow reflow then scale up for animation
        requestAnimationFrame(() => {
          content.style.transform = 'translate(-50%, -50%) scale(1.16)';
        });
      }
    }
  });
</script>

</body>
</html>
