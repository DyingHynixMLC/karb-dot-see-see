<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kraeb NXE</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: black;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #boot-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 999;
      background: black;
    }

    #dashboard-wrapper {
      display: none;
    }

    .dashboard {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(-180px);
    }

    .blade {
      position: absolute;
      width: 380px;
      height: 260px;
      background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
      border: 2px solid #28a745;
      color: #28a745;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: transform 0.3s ease, z-index 0.3s ease;
      box-shadow: 0 0 12px rgba(0, 128, 0, 0.5);
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #cdee4b, #a2d831);
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(20, 20, 20, 0.4), rgba(10, 10, 10, 0.3));
      z-index: -1;
    }
  </style>
</head>
<body>
  <video id="boot-video" autoplay muted playsinline>
    <source src="boot.mp4" type="video/mp4" />
  </video>

  <div id="dashboard-wrapper">
    <div class="dashboard">
      <div class="blade">Home</div>
      <div class="blade">Games</div>
      <div class="blade">Media</div>
      <div class="blade">Settings</div>
      <div class="blade">Profile</div>
    </div>
  </div>

  <script>
    const blades = document.querySelectorAll('.blade');
    let activeIndex = 0;

    const bladeLinks = {
      Home: 'https://kraeb.cc',
      Games: 'games.html',
      Media: 'media.html',
      Settings: 'settings.html',
      Profile: 'profile.html'
    };

    function updateBlades() {
      blades.forEach((blade, i) => {
        const offset = i - activeIndex;
        let translateX = offset * 255;
        let scale = 1 - Math.abs(offset) * 0.08;
        let zIndex = 3 - Math.abs(offset);
        blade.style.transform = `translateX(${translateX}px) scale(${scale})`;
        blade.style.zIndex = zIndex;
      });
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        activeIndex = Math.min(blades.length - 1, activeIndex + 1);
        updateBlades();
      } else if (e.key === 'ArrowLeft') {
        activeIndex = Math.max(0, activeIndex - 1);
        updateBlades();
      } else if (e.key === 'Enter') {
        const activeBladeText = blades[activeIndex].textContent.trim();
        const url = bladeLinks[activeBladeText];
        if (url) window.location.href = url;
      }
    });

    const bootVideo = document.getElementById('boot-video');
    const dashboardWrapper = document.getElementById('dashboard-wrapper');

    bootVideo.addEventListener('ended', () => {
      bootVideo.style.display = 'none';
      dashboardWrapper.style.display = 'block';
      updateBlades();
    });
  </script>
</body>
</html>
