<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kraeb NXE</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #3a3a3a, #0e0e0e);
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    .dashboard {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
    }

    .blade {
      background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
      border: 2px solid #3b3b3b;
      color: white;
      width: 260px;
      height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border-radius: 1rem;
      position: absolute;
      transition: transform 0.3s ease, z-index 0.3s ease;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
    }

    .blade:nth-child(1) {
      transform: translateX(-320px) scale(0.85);
      z-index: 1;
    }

    .blade:nth-child(2) {
      transform: translateX(-160px) scale(0.92);
      z-index: 2;
    }

    .blade:nth-child(3) {
      transform: translateX(0px) scale(1);
      z-index: 3;
    }

    .blade:nth-child(4) {
      transform: translateX(160px) scale(0.92);
      z-index: 2;
    }

    .blade:nth-child(5) {
      transform: translateX(320px) scale(0.85);
      z-index: 1;
    }

    .blade:hover {
      transform: translateY(-20px) scale(1.05) !important;
      z-index: 5 !important;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="blade">Home</div>
    <div class="blade">Games</div>
    <div class="blade">Media</div>
    <div class="blade">Settings</div>
    <div class="blade">Profile</div>
  </div>
</body>
</html>
