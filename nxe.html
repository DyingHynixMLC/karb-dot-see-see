<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kraeb NXE</title>
  <style>
body {
  margin: 0;
  padding: 0;
  background:
    url('nxebg.jpg') no-repeat center center fixed;
  background-size: cover;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

.dashboard {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translateX(-180px);
}
    

.blade {
  position: absolute;
  width: 380px;
  height: 260px;
  background: linear-gradient(to bottom, #cdee4b 0%, #a2d831 100%);
  border: 3px solid #8cb529;
  color: #f0f5cc;
  border-radius: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.7rem;
  font-weight: 600;
  text-shadow: 0 0 6px #ddef7a;
  box-shadow:
    0 8px 20px rgba(205, 238, 75, 0.4),
    inset 0 -4px 10px #e3f07b;
  transition: transform 0.3s ease, z-index 0.3s ease, box-shadow 0.3s ease;
  cursor: pointer;
  overflow: hidden;
}

.blade::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 60%, rgba(30, 30, 30, 0.3) 100%);
  border-radius: inherit;
  pointer-events: none;
}

.blade:hover {
  box-shadow:
    0 12px 28px rgba(205, 238, 75, 0.8),
    inset 0 -5px 15px #f4ff9c,
    0 0 18px #cdee4b;
  transform: scale(1.05);
}



  </style>
</head>
<body>
  <div class="dashboard">
    <div class="blade">Home</div>
    <div class="blade">Games</div>
    <div class="blade">Media</div>
    <div class="blade">Settings</div>
    <div class="blade">Profile</div>
  </div>

  <script>
    const blades = document.querySelectorAll('.blade');
    let activeIndex = 0;

    const bladeLinks = {
      Home: 'https://kraeb.cc',
      Games: 'games.html',
      Media: 'media.html',
      Settings: 'settings.html',
      Profile: 'profile.html'
    };

    function updateBlades() {
      blades.forEach((blade, i) => {
        const offset = i - activeIndex;

        let translateX = offset * 255;
        let scale = 1 - Math.abs(offset) * 0.08;
        let zIndex = 3 - Math.abs(offset);

        blade.style.transform = `translateX(${translateX}px) scale(${scale})`;
        blade.style.zIndex = zIndex;
      });
    }

    updateBlades();

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        activeIndex = Math.min(blades.length - 1, activeIndex + 1);
        updateBlades();
      } else if (e.key === 'ArrowLeft') {
        activeIndex = Math.max(0, activeIndex - 1);
        updateBlades();
      } else if (e.key === 'Enter') {
        const activeBladeText = blades[activeIndex].textContent.trim();
        const url = bladeLinks[activeBladeText];
        if (url) window.location.href = url;
      }
    });
  </script>
</body>
</html>
