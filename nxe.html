<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kraeb NXE</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0e0e0e;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    .dashboard {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: -60px; /* force overlap */
      position: relative;
    }

    .blade {
      background: #1a1a1a;
      border: 2px solid #3b3b3b;
      color: white;
      width: 250px;
      height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      border-radius: 1rem;
      transition: transform 0.4s, z-index 0.4s;
      position: relative;
      z-index: 1;
      margin-left: -100px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .dashboard:hover .blade {
      transform: scale(0.9);
      z-index: 0;
    }

    .blade:hover {
      transform: scale(1.2);
      z-index: 5;
    }

    .blade:nth-child(2):hover {
      transform: scale(1.1);
    }

    .blade:nth-child(3):hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="blade">Home</div>
    <div class="blade">Games</div>
    <div class="blade">Media</div>
    <div class="blade">Settings</div>
    <div class="blade">Profile</div>
  </div>
</body>
</html>
