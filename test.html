<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>kraeb.cc</title>
  <link rel="icon" href="https://cdn.discordapp.com/avatars/721608676783423499/01f5a25b1d88c75e0a8728b5c222dd86.png?size=512" type="image/png" sizes="512x512">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 2rem;
      width: 400px;
      height: 450px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      color: white;
      position: relative;
      z-index: 1;
      user-select: none;
    }

    .pfp {
      width: 100px;
      height: 100px;
      border-radius: 100%;
      object-fit: cover;
      border: 3px solid white;
      margin-bottom: 1rem;
    }

    .info {
      margin: 0.5rem 0;
      font-size: 1rem;
    }

    .info a {
      color: #00afff;
      text-decoration: none;
    }

    .info a:hover {
      text-decoration: underline;
    }

    #xbox-guide {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(18, 18, 18, 0.95);
      backdrop-filter: none;
      z-index: 1000;
      color: white;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .blade-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.5);
      transform-origin: center center;
      display: flex;
      gap: 0.5rem;
      width: 350px;
      max-width: 95vw;
      overflow: hidden;
      height: 200px;
    }

    .blade {
      background: #222;
      width: 35px; 
      height: 200px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.8);
      color: white;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      white-space: normal;
      overflow-wrap: break-word; 
      max-width: 350px; 
      transition: width 0.3s ease, padding 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .blade-content {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%; 
      height: auto;
      padding: 0.5rem 0.2rem;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .blade.inactive {
      width: 35px;
      padding: 0;
      white-space: nowrap;
      overflow: visible;
      cursor: pointer;
    }

    .blade.inactive .blade-content {
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 0 0.2rem;
      width: auto;
      height: auto;
    }

    .blade.inactive h3 {
      margin: 0;
      padding: 0;
      white-space: nowrap;
      font-size: 0.85rem;
      line-height: 1;
      transform-origin: center center;
      transform: rotate(90deg);
      transition: none; 
      user-select: none;
    }

    .blade.inactive p {
      display: none;
      margin: 0;
      padding: 0;
    }

    .blade.active {
      width: 350px;
      padding: 1rem 1.2rem;
      white-space: normal;
      cursor: default;
      max-width: 350px; 
    }

    .blade.active .blade-content {
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 0.5rem;
      padding: 0;
    }

    .blade.active h3 {
      transform: rotate(0deg);
      transition: none; 
      font-size: 1.6rem;
      margin-bottom: 1rem;
      user-select: text;
      word-break: break-word;
    }

    .blade.active p {
      font-size: 1rem;
      color: #ccc;
      margin-bottom: 1rem;
      display: block;
      word-break: break-word;
    }

    .blade a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <div class="card">
    <img class="pfp" src="https://cdn.discordapp.com/avatars/721608676783423499/01f5a25b1d88c75e0a8728b5c222dd86.png?size=512" alt="Profile Picture">
    <div class="info">hiya, i'm kraeb</div>
    <div class="info">programmer or something</div>
    <div class="info">my <a href="https://github.com/DyingHynixMLC" target="_blank">github profile</a></div>
    <div class="info">my <a href="https://discord.com/users/721608676783423499" target="_blank">discord profile</a></div>
  </div>

  <div id="xbox-guide">
    <div class="blade-wrapper">
      <div class="blade">
        <div class="blade-content">
          <h3>Placeholdeeeeeeeeeeeeeer</h3>
          <p>fr</p>
        </div>
      </div>
      <div class="blade">
        <div class="blade-content">
          <h3>YouTube NoCookiefier</h3>
          <p>Simple cookie remover for YouTube.</p>
        </div>
      </div>
      <div class="blade">
        <div class="blade-content">
          <h3>Placeholdeeeeeeeeeeer</h3>
          <p>frfrfr</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    const backgrounds = ["background.jpg", "borealis.jpg", "boreaalis.jpg"];
    const randomImage = backgrounds[Math.floor(Math.random() * backgrounds.length)];
    document.body.style.backgroundImage = `url('${randomImage}')`;

    particlesJS("particles-js", {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3, random: true },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#ffffff",
          opacity: 0.4,
          width: 1
        },
        move: { enable: true, speed: 3 }
      },
      interactivity: {
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" }
        },
        modes: {
          repulse: { distance: 100 },
          push: { particles_nb: 4 }
        }
      },
      retina_detect: true
    });

    const guide = document.getElementById('xbox-guide');
    const blades = guide.querySelectorAll('.blade');
    let activeIndex = 0;

    function updateActiveBlade() {
      blades.forEach((blade, i) => {
        if(i === activeIndex) {
          blade.classList.add('active');
          blade.classList.remove('inactive');
        } else {
          blade.classList.remove('active');
          blade.classList.add('inactive');
        }
      });
    }

    updateActiveBlade();

    document.addEventListener('keydown', function(e) {
      if (e.key.toLowerCase() === 'm') {
        guide.style.display = guide.style.display === 'flex' || guide.style.display === 'block' ? 'none' : 'flex';
        guide.style.flexDirection = 'column';
        activeIndex = 0;
        updateActiveBlade();
      }
      if(guide.style.display !== 'none'){
        if(e.key === 'ArrowLeft' || e.key === 'a') {
          activeIndex = (activeIndex - 1 + blades.length) % blades.length;
          updateActiveBlade();
        }
        if(e.key === 'ArrowRight' || e.key === 'd') {
          activeIndex = (activeIndex + 1) % blades.length;
          updateActiveBlade();
        }
        if(e.key === 'Escape') {
          guide.style.display = 'none';
        }
      }
    });

    blades.forEach((blade, i) => {
      blade.addEventListener('click', () => {
        activeIndex = i;
        updateActiveBlade();
      });
    });
  </script>
</body>
</html>
