<style>
  #xbox-guide {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: none;
    z-index: 1000;
    color: white;
    overflow: hidden;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  }

  .blade-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 0.5rem;
    width: 900px;
    max-width: 95vw;
  }

  .blade {
    background: #111;
    border-left: 5px solid #107C10; /* Xbox Green */
    width: 380px;
    height: 220px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.8);
    color: white;
    padding: 1rem 1.2rem;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .blade h3 {
    font-size: 1.6rem;
    font-weight: 700;
    margin: 0 0 1rem 0;
    letter-spacing: 0.02em;
  }

  .blade p {
    flex-grow: 1;
    font-size: 1rem;
    line-height: 1.4;
    color: #ccc;
    margin-bottom: 1rem;
  }

  .blade button {
    background: #107C10;
    border: none;
    border-radius: 0.3rem;
    padding: 0.5rem 1rem;
    font-size: 1rem;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: background-color 0.3s ease;
    align-self: flex-start;
  }

  .blade button:hover {
    background: #0f5e0f;
  }

  .blade a {
    text-decoration: none;
    color: inherit;
  }
</style>

<div id="xbox-guide">
  <div class="blade-wrapper">
    <div class="blade">
      <h3>Placeholder</h3>
      <p>eta wen</p>
    </div>
    <div class="blade">
      <h3>YouTube NoCookiefier</h3>
      <p>Linkie Fixie</p>
      <a href="https://github.com/DyingHynixMLC/decookiefy" target="_blank">
        <button>View Project</button>
      </a>
    </div>
    <div class="blade">
      <h3>Settings</h3>
      <p>Theme, animations, about</p>
      <button onclick="document.getElementById('xbox-guide').style.display='none'">Close</button>
    </div>
  </div>
</div>
